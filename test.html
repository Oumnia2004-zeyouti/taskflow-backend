<form id='formQuiz'> 
<p><strong>Q1</strong> — Quelle méthode sélectionne un élément par son id ?</p>   
<label><input type='radio' name='q1' value='a'> querySelector</label><br>  
<label><input type='radio' name='q1' value='b'> getElementById</label><br>   
<label><input type='radio' name='q1' value='c'> getElementByClass</label><br><br>    
<p><strong>Q2</strong> — Quel événement se déclenche lors d'un appui sur une touche ?</p>   
<label><input type='radio' name='q2' value='a'> mousedown</label><br>   <label><input type='radio' name='q2' value='b'> keydown</label><br> 
<label><input type='radio' name='q2' value='c'> input</label><br><br> 
<button type='submit'>Valider</button> </form>
<div id='resultat'></div>  <script>  
const reponses = { q1: 'b', q2: 'b' };  
document.getElementById('formQuiz').addEventListener('submit', function (e) { 
    e.preventDefault();
    
    let score = 0;
    const details = [];
     const q1Choisi = document.querySelector('input[name="q1"]:checked');
    if (q1Choisi && q1Choisi.value === reponses['q1']) {
      score++;
      details.push(' Q1 : Correct');
    } else {
      details.push(' Q1 : Incorrect');
    }
      const q2Choisi = document.querySelector('input[name="q2"]:checked');
    if (q2Choisi && q2Choisi.value === reponses['q2']) {
      score++;
      details.push(' Q2 : Correct');
    } else {
      details.push(' Q2 : Incorrect');
    }
    const resultatDiv = document.getElementById('resultat');
    const messageFinal = (score === 2) ? 'Bravo !' : 'Révisez le cours';
    
    resultatDiv.innerHTML = `
      <h3>Score : ${score} / 2</h3>
      <ul>
        <li>${details[0]}</li>
        <li>${details[1]}</li>
      </ul>
      <p><strong>${messageFinal}</strong></p>
    `;
  });
</script>
